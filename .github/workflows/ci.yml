name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (lint, imports, unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev + eval extras)
        working-directory: backend
        run: pip install -e '.[dev,eval]'

      - name: Ruff
        working-directory: backend
        run: ruff check src tests

      - name: Import boundaries (hexagonal layers)
        working-directory: backend
        run: lint-imports

      # mypy: currently at 0 errors as of T13 (backend "src" is clean) and could
      # be enabled as a blocking step in the future. Kept out of CI for now as a
      # deliberate deferral (not outstanding debt) to stay robust against
      # third-party stub-version drift on main.

      - name: Unit tests with coverage gate (>=79%)
        working-directory: backend
        run: |
          pytest -q tests/unit \
            --cov=src/tfm_rag/domain \
            --cov=src/tfm_rag/application \
            --cov=src/tfm_rag/infrastructure \
            --cov-fail-under=79 \
            --cov-report=term

  frontend:
    name: frontend (build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test
