repos:
  - repo: local
    hooks:
      - id: lint-imports
        name: import-linter (hexagonal boundaries)
        entry: bash scripts/lint-imports.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
      - id: coverage-gate
        name: pytest coverage ≥79%
        entry: bash scripts/coverage.sh --no-html
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
