events {}
http {
  # The agentic chat on CPU can take minutes; next-dev caps upstream at ~30s, so
  # /api and /widget bypass Next and go straight to the backend with long timeouts.
  proxy_read_timeout 600s; proxy_send_timeout 600s; proxy_http_version 1.1;
  server {
    listen 80;
    location /api/    { proxy_pass http://host.docker.internal:8000; proxy_set_header Host $host; }
    location /widget/ { proxy_pass http://host.docker.internal:8000; proxy_set_header Host $host; }
    location /        { proxy_pass http://host.docker.internal:3001; proxy_set_header Host $host; }
  }
}
