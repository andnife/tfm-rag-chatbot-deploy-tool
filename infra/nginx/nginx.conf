events {}
http {
  # The chat endpoint blocks on LLM generation, which can take several minutes
  # on CPU. Raise the upstream read/send timeouts well above nginx's 60s default
  # so long-running chat requests aren't reset mid-flight.
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_http_version 1.1;

  server {
    listen 80;

    # /api and /widget go STRAIGHT to FastAPI — bypassing Next's rewrite proxy,
    # which caps upstream requests (~30s) and would reset the long chat request.
    # proxy_pass without a trailing path preserves the full URI (/api/... ,
    # /widget/...), which is exactly what the backend serves.
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /widget/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the Next.js app.
    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
